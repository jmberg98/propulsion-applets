<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Stuhlinger Curve Applet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#090909}
body{
  display:flex;flex-direction:column;
  font-family:'Barlow','Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:#090909;color:#f1f1f1;
}

/* ── top bar ─────────────────────────────────────── */
#hdr{
  flex-shrink:0;
  background:#0e0e0e;
  border-bottom:1px solid #282828;
  color:#a0a0a0;
  padding:8px 18px;
  font-size:12px;font-weight:700;
  letter-spacing:1.4px;text-transform:uppercase;
  user-select:none;
}

/* ── shell ───────────────────────────────────────── */
#wrap{flex:1;display:flex;min-height:0;overflow:hidden}

#charts{
  flex:1;display:grid;
  grid-template-rows:0.92fr 1.18fr;
  min-width:0;background:#090909;
}
#plot-mass,#plot-obj{min-height:0}

#panel{
  flex-shrink:0;width:340px;
  background:#0e0e0e;
  border-left:1px solid #282828;
  padding:8px 12px 10px;
  overflow:hidden;
  display:flex;flex-direction:column;
}

/* ── section label ───────────────────────────────── */
.sec{
  font-size:13px;font-weight:700;
  color:#545454;
  letter-spacing:1px;text-transform:uppercase;
  border-bottom:1px solid #282828;padding-bottom:3px;
  margin:8px 0 5px;
}
.sec:first-child{margin-top:1px}

.ctl{margin-bottom:5px}
.auto-note{font-size:9px;color:#484848;line-height:1.3;margin:1px 0 6px;}

/* ── number inputs ───────────────────────────────── */
.irow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px}
.irow label{font-size:13px;color:#727272;flex:1;padding-right:8px;line-height:1.3}
.irow input[type="number"]{
  width:116px;padding:5px 7px;
  font-family:'Courier New',monospace;
  font-size:13px;text-align:right;
  border:1px solid #282828;border-radius:4px;
  background:#1d1d1d;color:#d0d0d0;
  -moz-appearance:textfield;
}
.irow input[type="number"]::-webkit-outer-spin-button,
.irow input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.irow input[type="number"]:focus{
  outline:none;border-color:#484848;background:#202020;
}

/* ── sliders ─────────────────────────────────────── */
.srow{
  display:grid;grid-template-columns:40px 1fr 40px;
  gap:6px;align-items:center;margin-bottom:1px;
}
.srow input[type="range"]{
  width:100%;accent-color:#3DBFFF;cursor:pointer;
}
.smin,.smax{
  font-family:'Courier New',monospace;
  font-size:12px;color:#444;text-align:center;user-select:none;
}

.shint{
  font-size:12px;font-style:italic;
  text-align:right;margin:0 0 4px;min-height:12px;
  color:#505050;
}

/* ── alpha regime bar ────────────────────────────── */
.regbox{margin:0 0 5px}
.regttl{font-size:12px;color:#444;margin-bottom:2px;}
.regbar{
  position:relative;height:20px;
  border:1px solid #252525;border-radius:4px;
  overflow:hidden;background:#111;
}
.regseg{
  position:absolute;top:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;line-height:1;text-align:center;
  color:#ccc;padding:0 2px;
  border-right:1px solid rgba(255,255,255,0.05);
  overflow:hidden;white-space:nowrap;
}
.regmark{
  position:absolute;top:-2px;bottom:-2px;width:2px;
  background:#3DBFFF;
  box-shadow:0 0 5px rgba(61,191,255,0.65);
}
.regticks{position:relative;height:12px;margin-top:1px;}
.regtick{
  position:absolute;top:0;
  font-size:7.5px;color:#444;white-space:nowrap;user-select:none;
}

/* ── divider ─────────────────────────────────────── */
.sep{border:none;border-top:1px solid #282828;margin:5px 0}

/* ── output values ───────────────────────────────── */
.orow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.olbl{font-size:14px;color:#545454}
.oval{
  font-family:'Courier New',monospace;
  font-size:14px;font-weight:700;color:#e6f7ff;
}
.oval.bad{color:#ff8e8e;font-size:9.5px}

.ohint{
  font-size:12px;font-style:italic;
  text-align:right;margin:-2px 0 4px;min-height:12px;
  color:#505050;
}

.note{font-size:9px;color:#444;line-height:1.35;margin-top:2px}

/* ── Plotly modebar dark skin ────────────────────── */
.modebar{
  background:rgba(14,14,14,0.88)!important;
  border-radius:4px!important;
}
.modebar-btn path{fill:#505050!important;transition:fill .15s}
.modebar-btn:hover path{fill:#d0d0d0!important}
.modebar-group{border:none!important}
</style>
</head>
<body>

<div id="hdr">⚡ Stuhlinger Curve Applet — Electric Propulsion Optimizer</div>

<div id="wrap">
  <div id="charts">
    <div id="plot-mass"></div>
    <div id="plot-obj"></div>
  </div>

  <div id="panel">
    <div class="sec">Inputs</div>

    <div class="ctl">
      <div class="irow">
        <label for="n-eta">Efficiency η</label>
        <input type="number" id="n-eta" value="0.65" min="0.10" max="1.00" step="0.01">
      </div>
      <div class="srow">
        <span class="smin">0.10</span>
        <input type="range" id="s-eta" min="0.10" max="1.00" step="0.01" value="0.65">
        <span class="smax">1.00</span>
      </div>
    </div>

    <div class="ctl">
      <div class="irow">
        <label for="n-F">Thrust F [N]</label>
        <input type="number" id="n-F" value="1.0" min="0.01" max="20.0" step="0.01">
      </div>
      <div class="srow">
        <span class="smin">0.01</span>
        <input type="range" id="s-F" min="0.01" max="20.0" step="0.01" value="1.0">
        <span class="smax">20</span>
      </div>
    </div>

    <div class="ctl">
      <div class="irow">
        <label for="n-alpha">Spec. mass α [kg/W]</label>
        <input type="number" id="n-alpha" value="0.02" min="0.0001" max="10" step="any">
      </div>
      <div class="srow">
        <span class="smin">1e-4</span>
        <input type="range" id="s-alpha" min="-4" max="1" step="0.01">
        <span class="smax">10</span>
      </div>
      <div class="regbox">
        <div class="regttl">Specific-mass technology regimes</div>
        <div class="regbar" id="alpha-tech-bar"></div>
        <div class="regticks" id="alpha-tech-ticks"></div>
      </div>
      <div class="shint" id="h-psrc"></div>
    </div>

    <div class="ctl">
      <div class="irow">
        <label for="n-t">Mission time t<sub>m</sub> [days]</label>
        <input type="number" id="n-t" value="180" min="1" max="2000" step="1">
      </div>
      <div class="srow">
        <span class="smin">10</span>
        <input type="range" id="s-t" min="10" max="2000" step="1" value="180">
        <span class="smax">2000</span>
      </div>
    </div>

    <div class="ctl">
      <div class="irow">
        <label for="n-dv">Delta-V ΔV [m/s]</label>
        <input type="number" id="n-dv" value="3000" min="100" max="60000" step="100">
      </div>
      <div class="srow">
        <span class="smin">100</span>
        <input type="range" id="s-dv" min="100" max="60000" step="100" value="3000">
        <span class="smax">60000</span>
      </div>
    </div>

    <hr class="sep">
    <div class="sec">Outputs</div>

    <div class="orow">
      <span class="olbl">Stuhlinger V<sub>ch</sub> [m/s]</span>
      <span class="oval" id="o-vch">—</span>
    </div>
    <div class="ohint" id="h-vch-isp"></div>

    <div class="orow">
      <span class="olbl">Optimum C<sub>opt</sub> [m/s]</span>
      <span class="oval" id="o-copt">—</span>
    </div>
    <div class="ohint" id="h-copt-isp"></div>
    <div class="ohint" id="h-thr"></div>

    <div class="orow">
      <span class="olbl">Error E [%]</span>
      <span class="oval" id="o-err">—</span>
    </div>
    <div class="orow">
      <span class="olbl">ε (dimensionless)</span>
      <span class="oval" id="o-eps">—</span>
    </div>
    <div class="orow">
      <span class="olbl">λ at C<sub>opt</sub></span>
      <span class="oval" id="o-lam">—</span>
    </div>

    <hr class="sep">
  </div>
</div>

<script>
"use strict";
const G0           = 9.80665;
const ISP_AXIS_MIN = 0;
const ISP_VIEW_MAX = 20000;
const ISP_DATA_MAX = 20000;
const ISP_DATA_MIN = 50;

/* ═══════════════════  numeric helpers  ═════════════════════════════════ */
function linspace(a, b, n) {
  const r = new Array(n), h = (b - a) / (n - 1);
  for (let i = 0; i < n; i++) r[i] = a + i * h;
  return r;
}
function logspace(lo, hi, n) {
  const r = new Array(n), h = (hi - lo) / (n - 1);
  for (let i = 0; i < n; i++) r[i] = Math.pow(10, lo + i * h);
  return r;
}
const clamp = (x, lo, hi) => Math.min(hi, Math.max(lo, x));

function goldenMin(f, lo, hi, tol) {
  tol = tol || 1e-12;
  const phi = (Math.sqrt(5) - 1) / 2;
  let c = hi - phi * (hi - lo), d = lo + phi * (hi - lo);
  let fc = f(c), fd = f(d);
  for (let k = 0; k < 400 && Math.abs(hi - lo) > tol; k++) {
    if (fc < fd) { hi = d; d = c; fd = fc; c = hi - phi * (hi - lo); fc = f(c); }
    else         { lo = c; c = d; fc = fd; d = lo + phi * (hi - lo); fd = f(d); }
  }
  return (lo + hi) / 2;
}

/* ═══════════════════  governing physics  ═══════════════════════════════ */
const mps     = (c, F, eta, al) => al * F * c / (2 * eta);
const mp      = (c, F, t)       => F * t / c;
const vch     = (eta, al, t)    => Math.sqrt(2 * eta * t / al);
const calcEps = (eta, al, t, dV)=> al * dV * dV / (2 * eta * t);

function lamZ(z, eps) {
  if (z <= 0) return -Infinity;
  const e = Math.exp(-Math.min(z, 700));
  return e - eps * (1 - e) / (z * z);
}
function lamC(c, eta, al, t, dV) {
  const z = dV / c, e = Math.exp(-Math.min(z, 700));
  return e - (al * c * c / (2 * eta * t)) * (1 - e);
}

const Z_GRID = logspace(-4, 2, 8000);

function findCopt(eta, al, t, dV) {
  const eps = calcEps(eta, al, t, dV);
  let bi = 0, bv = -Infinity;
  for (let i = 0; i < Z_GRID.length; i++) {
    const v = lamZ(Z_GRID[i], eps);
    if (isFinite(v) && v > bv) { bv = v; bi = i; }
  }
  let lo = Z_GRID[Math.max(bi - 2, 0)];
  let hi = Z_GRID[Math.min(bi + 2, Z_GRID.length - 1)];
  if (hi <= lo) { lo = 0.5 * Z_GRID[bi]; hi = 2 * Z_GRID[bi]; }
  const zOpt   = goldenMin(z => -lamZ(z, eps), lo, hi, 1e-12);
  const lamOpt = lamZ(zOpt, eps);
  return { cOpt: dV / zOpt, lamOpt, eps };
}

/* ═══════════════════  classifications  ════════════════════════════════ */
function powerName(al) {
  if (al >= 5.0)   return "Chemical";
  if (al >= 1.0)   return "Chemical / RTG";
  if (al >= 0.1)   return "RTG / Solar (deep-space)";
  if (al >= 0.01)  return "Solar (near-Earth)";
  if (al >= 0.001) return "Nuclear fission";
  return "Advanced nuclear";
}

const DEVICE_REGIMES = [
  { lo:  40, hi:  150, name:"Cold Gas",           short:"Cold Gas",
    fill:"rgba(66,165,245,0.07)",  ribbon:"rgba(66,165,245,0.22)",  line:"#4fc3f7" },
  { lo: 100, hi:  400, name:"Resistojet",         short:"Resistojet",
    fill:"rgba(102,187,106,0.07)", ribbon:"rgba(102,187,106,0.22)", line:"#81c784" },
  { lo: 350, hi: 1200, name:"Arcjet",             short:"Arcjet",
    fill:"rgba(255,238,88,0.06)",  ribbon:"rgba(255,238,88,0.22)",  line:"#ffd54f" },
  { lo: 800, hi: 2500, name:"Hall Thruster",      short:"Hall Thruster",
    fill:"rgba(255,167,38,0.07)",  ribbon:"rgba(255,167,38,0.24)",  line:"#ffb74d" },
  { lo:1800, hi:10000, name:"Gridded Ion Engine", short:"Ion Engine",
    fill:"rgba(171,71,188,0.07)",  ribbon:"rgba(171,71,188,0.22)",  line:"#ba68c8" },
  { lo:3000, hi:20000, name:"MPD / VASIMR",       short:"MPD / VASIMR",
    fill:"rgba(239,83,80,0.06)",   ribbon:"rgba(239,83,80,0.20)",   line:"#e57373" }
];

function deviceMatches(isp) {
  return DEVICE_REGIMES.filter(r => isp >= r.lo && isp <= r.hi).map(r => r.name);
}
function deviceLabelText(isp) {
  const names = deviceMatches(isp);
  return names.length ? names.join(" ; ") : "Outside listed nominal device bands";
}

/* ═══════════════════  alpha regimes (dark-friendly)  ══════════════════ */
const ALPHA_REGIMES = [
  { lo:1e-4, hi:1e-3, label:"Fusion", name:"Nuclear fusion",
    color:"rgba(92,107,192,0.50)" },
  { lo:1e-3, hi:1e-2, label:"Fission", name:"Nuclear fission",
    color:"rgba(2,119,189,0.50)" },
  { lo:1e-2, hi:1e-1, label:"Solar",   name:"Solar (near-Earth)",
    color:"rgba(200,165,0,0.48)" },
  { lo:1e-1, hi:1,    label:"RTG/DS",  name:"RTG / Solar (deep-space)",
    color:"rgba(200,100,0,0.48)" },
  { lo:1,    hi:5,    label:"C/RTG",   name:"Chemical / RTG",
    color:"rgba(180,55,40,0.48)" },
  { lo:5,    hi:10,   label:"Chem",    name:"Chemical",
    color:"rgba(160,25,25,0.55)" }
];
const ALPHA_BOUNDS = [1e-4, 1e-3, 1e-2, 1e-1, 1, 5, 10];

/* ═══════════════════  DOM helpers  ════════════════════════════════════ */
const $ = id => document.getElementById(id);

function setVal(id, txt, bad) {
  const el = $(id);
  el.textContent = txt;
  el.className = bad ? "oval bad" : "oval";
}
function setHint(id, txt, col) {
  const el = $(id);
  el.textContent = txt;
  if (col !== undefined) el.style.color = col;
}
function gFmt(x, n) {
  if (!isFinite(x)) return String(x);
  return parseFloat(x.toPrecision(n || 4)).toString();
}

/* ═══════════════════  controls  ═══════════════════════════════════════ */
const CTRL = {
  eta:   { num:"n-eta",   slider:"s-eta",   min:0.10, max:1.00,  step:0.01, scale:"linear" },
  F:     { num:"n-F",     slider:"s-F",     min:0.01, max:20.0,  step:0.01, scale:"linear" },
  alpha: { num:"n-alpha", slider:"s-alpha", min:1e-4, max:10.0,             scale:"log"    },
  t:     { num:"n-t",     slider:"s-t",     min:10,   max:2000,  step:1,    scale:"linear" },
  dv:    { num:"n-dv",    slider:"s-dv",    min:100,  max:60000, step:100,  scale:"linear" }
};

const alphaToSlider = a => Math.log10(a);
const sliderToAlpha = s => Math.pow(10, s);

/* ═══════════════════  alpha regime bar  ═══════════════════════════════ */
function alphaPct(a) {
  const lo = Math.log10(CTRL.alpha.min), hi = Math.log10(CTRL.alpha.max);
  return 100 * (Math.log10(a) - lo) / (hi - lo);
}
function buildAlphaRegimeBar() {
  const bar   = $("alpha-tech-bar");
  const ticks = $("alpha-tech-ticks");
  bar.innerHTML = "";
  ticks.innerHTML = "";

  ALPHA_REGIMES.forEach(r => {
    const seg = document.createElement("div");
    seg.className = "regseg";
    seg.textContent = r.label;
    seg.title = `${r.name}: ${gFmt(r.lo,3)} to ${gFmt(r.hi,3)} kg/W`;
    seg.style.left  = alphaPct(r.lo) + "%";
    seg.style.width = (alphaPct(r.hi) - alphaPct(r.lo)) + "%";
    seg.style.background = r.color;
    bar.appendChild(seg);
  });

  const mark = document.createElement("div");
  mark.id = "alpha-marker";
  mark.className = "regmark";
  bar.appendChild(mark);

  ALPHA_BOUNDS.forEach((v, i) => {
    const tk = document.createElement("div");
    tk.className = "regtick";
    tk.textContent = gFmt(v, 1);
    tk.style.left = alphaPct(v) + "%";
    tk.style.transform = (
      i === 0 ? "translateX(0)" :
      i === ALPHA_BOUNDS.length - 1 ? "translateX(-100%)" :
      "translateX(-50%)"
    );
    ticks.appendChild(tk);
  });
}
function updateAlphaRegimeMarker(alpha) {
  const m = $("alpha-marker");
  if (!m) return;
  m.style.left = `calc(${alphaPct(alpha)}% - 1px)`;
}

/* ═══════════════════  control syncing  ════════════════════════════════ */
let updateRAF = 0;
function scheduleUpdate() {
  if (updateRAF) cancelAnimationFrame(updateRAF);
  updateRAF = requestAnimationFrame(() => { updateRAF = 0; update(); });
}

function syncFromNumber(key, doUpdate) {
  const c = CTRL[key], n = $(c.num), s = $(c.slider);
  let v = +n.value;
  if (!isFinite(v)) v = (c.scale === "log") ? sliderToAlpha(+s.value) : +s.value;
  v = clamp(v, c.min, c.max);
  if (c.scale === "log") {
    n.value = gFmt(v, 6);
    s.value = alphaToSlider(v);
    updateAlphaRegimeMarker(v);
  } else {
    n.value = String(v);
    s.value = v;
  }
  if (doUpdate !== false) scheduleUpdate();
}

function mirrorFromNumberIfInRange(key) {
  const c = CTRL[key], n = $(c.num), s = $(c.slider);
  const v = +n.value;
  if (!isFinite(v) || v < c.min || v > c.max) return;
  if (c.scale === "log") {
    s.value = alphaToSlider(v);
    updateAlphaRegimeMarker(v);
  } else {
    s.value = v;
  }
  scheduleUpdate();
}

function syncFromSlider(key) {
  const c = CTRL[key], n = $(c.num), s = $(c.slider);
  const v = (c.scale === "log") ? sliderToAlpha(+s.value) : +s.value;
  if (c.scale === "log") {
    n.value = gFmt(v, 6);
    updateAlphaRegimeMarker(v);
  } else {
    n.value = String(v);
  }
  scheduleUpdate();
}

function bindControl(key) {
  const c = CTRL[key], n = $(c.num), s = $(c.slider);
  n.addEventListener("input",   () => mirrorFromNumberIfInRange(key));
  n.addEventListener("change",  () => syncFromNumber(key));
  n.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); syncFromNumber(key); n.blur(); }
  });
  s.addEventListener("input",  () => syncFromSlider(key));
  s.addEventListener("change", () => syncFromSlider(key));
  syncFromNumber(key, false);
}

/* ═══════════════════  Plotly shared config  ════════════════════════════ */
const PCFG = {
  responsive: true,
  displayModeBar: true,
  scrollZoom: true,
  modeBarButtonsToRemove: ["select2d","lasso2d"]
};

/* dark-theme defaults */
const GRID = { showgrid:true, gridcolor:"rgba(255,255,255,0.07)", zeroline:false };
const MARG = { t:70, b:44, l:65, r:14 };

const PFONT = {
  family:"'Barlow','Segoe UI',Tahoma,Geneva,Verdana,sans-serif",
  color:"#888",
  size:11
};

const HOVERSTYLE = {
  bgcolor:"#161616",
  bordercolor:"#383838",
  font:{ color:"#c8c8c8", family:"'Courier New',monospace", size:11 }
};

/* ═══════════════════  device band overlays  ════════════════════════════ */
function deviceOverlay(xLo, xHi) {
  const shapes      = [];
  const annotations = [];

  const lanes = [
    [0.90, 0.98],
    [0.80, 0.88],
    [0.70, 0.78]
  ];

  DEVICE_REGIMES.forEach((r, i) => {
    const lo = Math.max(xLo, r.lo);
    const hi = Math.min(xHi, r.hi);
    if (hi <= lo) return;

    shapes.push({
      type:"rect", xref:"x", yref:"paper",
      x0:lo, x1:hi, y0:0, y1:1,
      fillcolor:r.fill, line:{width:0}, layer:"below"
    });
    shapes.push({
      type:"line", xref:"x", yref:"paper",
      x0:lo, x1:lo, y0:0, y1:1,
      line:{color:r.line, width:0.8, dash:"dot"}, layer:"below"
    });
    shapes.push({
      type:"line", xref:"x", yref:"paper",
      x0:hi, x1:hi, y0:0, y1:1,
      line:{color:r.line, width:0.8, dash:"dot"}, layer:"below"
    });

    const [y0, y1] = lanes[i % lanes.length];
    shapes.push({
      type:"rect", xref:"x", yref:"paper",
      x0:lo, x1:hi, y0, y1,
      fillcolor:r.ribbon, line:{color:r.line, width:1}, layer:"below"
    });

    let x       = 0.5 * (lo + hi);
    let xanchor = "center";
    if (x < xLo + 500)  { x = lo + 20;  xanchor = "left";  }
    else if (x > xHi - 500) {
      if (r.hi === 20000) { x = lo + 500; xanchor = "left"; }
      else                { x = hi - 20;  xanchor = "right"; }
    }

    annotations.push({
      x, y:0.5 * (y0 + y1),
      xref:"x", yref:"paper",
      xanchor,
      text:`<b>${r.short}</b>`,
      showarrow:false,
      align:"center",
      font:{size:11, color:"#d0d0d0"},
      bgcolor:"rgba(9,9,9,0.90)",
      bordercolor:r.line, borderwidth:1,
      opacity:0.98
    });
  });

  return { shapes, annotations };
}

/* ═══════════════════  main update  ════════════════════════════════════ */
function update() {
  const eta = +$("n-eta").value;
  const F   = +$("n-F").value;
  const al  = +$("n-alpha").value;
  const td  = +$("n-t").value;
  const dV  = +$("n-dv").value;

  if ([eta, F, al, td, dV].some(x => !isFinite(x) || x <= 0) || eta > 1) return;

  const t      = td * 86400;
  const Vc     = vch(eta, al, t);
  const { cOpt, lamOpt, eps } = findCopt(eta, al, t, dV);
  const errPct = 100 * Math.abs(cOpt - Vc) / cOpt;
  const ispVc  = Vc   / G0;
  const ispCopt= cOpt / G0;

  /* ── sidebar outputs ───────────────────────────────────────────────── */
  setVal ("o-vch",  Vc.toFixed(2));
  setHint("h-vch-isp", `Isp = ${ispVc.toFixed(1)} s`, "#3DBFFF");
  setVal ("o-eps",  gFmt(eps, 4));
  setHint("h-psrc", `Current α regime: ${powerName(al)}`, "#c07838");

  if (lamOpt <= 0) {
    setVal ("o-copt", "MISSION NOT POSSIBLE", true);
    setVal ("o-err",  "N/A", true);
    setVal ("o-lam",  "MISSION NOT POSSIBLE", true);
    setHint("h-copt-isp", "MISSION NOT POSSIBLE", "#ff6b6b");
    setHint("h-thr", "", "#9FE6FF");
  } else {
    setVal ("o-copt", cOpt.toFixed(2));
    setVal ("o-err",  errPct.toFixed(3));
    setVal ("o-lam",  lamOpt.toFixed(6));
    setHint("h-copt-isp", `Isp = ${ispCopt.toFixed(1)} s`, "#3DBFFF");
    setHint("h-thr", `${deviceLabelText(ispCopt)}`, "#9FE6FF");
  }

  /* ── data arrays ───────────────────────────────────────────────────── */
  const ispArr = linspace(ISP_DATA_MIN, ISP_DATA_MAX, 2200);
  const cArr   = ispArr.map(s => s * G0);
  const bands  = deviceOverlay(ISP_AXIS_MIN, ISP_DATA_MAX);

  const mpsArr = cArr.map(c => mps(c, F, eta, al));
  const mpArr  = cArr.map(c => mp(c, F, t));
  const totArr = mpsArr.map((v, i) => v + mpArr[i]);
  const mTotVc = mps(Vc, F, eta, al) + mp(Vc, F, t);

  let yMHi = mTotVc;
  for (let i = 0; i < ispArr.length; i++) {
    if (cArr[i] < cOpt) continue;
    if (mpsArr[i] > yMHi) yMHi = mpsArr[i];
    if (mpArr[i]  > yMHi) yMHi = mpArr[i];
    if (totArr[i] > yMHi) yMHi = totArr[i];
  }
  yMHi = Math.min(yMHi, 5 * mTotVc) * 1.08;

  const lamArr = cArr.map(c => lamC(c, eta, al, t, dV));

  const SKIP    = { hoverinfo:"skip" };
  const vchLbl  = `Isp_ch = ${Math.round(ispVc)} s (${Math.round(Vc)} m/s)`;
  const coptLbl = `Isp_opt = ${Math.round(ispCopt)} s (${Math.round(cOpt)} m/s)`;
  const epsLbl  = gFmt(eps, 3);
  const titleObj = lamOpt <= 0
    ? `Objective function   (ε = ${epsLbl},   no feasible positive λ)`
    : `Objective function   (ε = ${epsLbl},   Isp_opt = ${Math.round(ispCopt)} s)`;

  /* shared legend config */
  const LEG = {
    x:1, xanchor:"right", y:0, yanchor:"bottom",
    font:{size:9, color:"#888"},
    bgcolor:"rgba(14,14,14,0.92)",
    bordercolor:"#2a2a2a", borderwidth:1
  };

  /* ══════════════  MASS PLOT  ══════════════════════════════════════════ */
  Plotly.react("plot-mass", [
    { x:ispArr, y:mpsArr, name:"m_ps  (power system)",
      type:"scatter", mode:"lines", line:{color:"#4dabf7", width:1.8} },
    { x:ispArr, y:mpArr,  name:"m_p  (propellant)",
      type:"scatter", mode:"lines", line:{color:"#ff9a3c", width:1.8} },
    { x:ispArr, y:totArr, name:"m_ps + m_p  (total)",
      type:"scatter", mode:"lines", line:{color:"#51cf66", width:2.8} },
    { x:[ispVc,   ispVc],   y:[0, yMHi], name:vchLbl,
      type:"scatter", mode:"lines",
      line:{color:"#ff6b6b", width:1.8, dash:"dash"}, ...SKIP },
    { x:[ispCopt, ispCopt], y:[0, yMHi], name:coptLbl,
      type:"scatter", mode:"lines",
      line:{color:"#c084fc", width:1.8}, ...SKIP },
    { x:[ispVc],  y:[mTotVc],
      type:"scatter", mode:"markers",
      marker:{color:"#ff6b6b", symbol:"triangle-up", size:11},
      showlegend:false, ...SKIP }
  ], {
    uirevision: "xpan-mass",
    title:{ text:"Stuhlinger Curve", font:{size:13, color:"#9a9a9a"} },
    font: PFONT,
    xaxis:{
      title:"Equivalent specific impulse  I<sub>sp</sub> = c / g₀  [s]",
      range:[ISP_AXIS_MIN, ISP_VIEW_MAX],
      minallowed: 0,
      tick0:0, dtick:1000,
      ...GRID
    },
    yaxis:{
      title:"Mass  [kg]",
      range:[0, yMHi],
      minallowed: 0,
      ...GRID
    },
    shapes:      bands.shapes,
    annotations: bands.annotations,
    legend:      LEG,
    hoverlabel:  HOVERSTYLE,
    dragmode:    "pan",
    hovermode:   "x unified",
    margin:      MARG,
    plot_bgcolor:  "#0d0d0d",
    paper_bgcolor: "#0e0e0e"
  }, PCFG);

  /* ══════════════  OBJECTIVE PLOT  ════════════════════════════════════ */
  Plotly.react("plot-obj", [
    { x:ispArr, y:lamArr, name:"λ(c)",
      type:"scatter", mode:"lines", line:{color:"#51cf66", width:2.2} },
    { x:[ISP_AXIS_MIN, ISP_DATA_MAX], y:[0, 0],
      type:"scatter", mode:"lines",
      line:{color:"rgba(255,255,255,0.18)", width:0.7},
      showlegend:false, ...SKIP },
    { x:[ispVc,   ispVc],   y:[0, 1], name:vchLbl,
      type:"scatter", mode:"lines",
      line:{color:"#ff6b6b", width:1.8, dash:"dash"}, ...SKIP },
    { x:[ispCopt, ispCopt], y:[0, 1], name:coptLbl,
      type:"scatter", mode:"lines",
      line:{color:"#c084fc", width:1.8}, ...SKIP },
    { x:[ispCopt], y:[lamOpt],
      type:"scatter", mode:"markers",
      marker:{color:"#c084fc", size:10},
      showlegend:false, ...SKIP }
  ], {
    uirevision: "xpan-obj",
    title:{ text:titleObj, font:{size:13, color:"#9a9a9a"} },
    font: PFONT,
    xaxis:{
      title:"Equivalent specific impulse  I<sub>sp</sub> = c / g₀  [s]",
      range:[ISP_AXIS_MIN, ISP_VIEW_MAX],
      minallowed: 0,
      tick0:0, dtick:1000,
      ...GRID
    },
    yaxis:{
      title:"Payload ratio  λ = m_L / m₀",
      range:[0, 1],
      fixedrange: true,
      ...GRID
    },
    shapes:      bands.shapes,
    annotations: bands.annotations,
    legend:      LEG,
    hoverlabel:  HOVERSTYLE,
    dragmode:    "pan",
    hovermode:   "x unified",
    margin:      MARG,
    plot_bgcolor:  "#0d0d0d",
    paper_bgcolor: "#0e0e0e"
  }, PCFG);
}

/* ═══════════════════  init  ════════════════════════════════════════════ */
buildAlphaRegimeBar();
["eta","F","alpha","t","dv"].forEach(bindControl);
update();
</script>
</body>
